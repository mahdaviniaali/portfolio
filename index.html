        /* کانتینر اصلی پورتفولیو */
        .portfolio-container {

            letter-spacing: 1px;

            padding: 0 10px;

            position: absolute;
            right: -10px;

        /* عنوان نام */

            overflow: hidden;
            white-space: nowrap;
            border-right: 3px solid rgba(255, 255, 255, 0.75);
            animation:

                blink-caret 0.75s step-end infinite;
            text-shadow: 0 0 15px rgba(0, 0, 0, 0.8);
            font-family: 'Playfair Display', serif;
            font-weight: 700;
            letter-spacing: 1px;
            opacity: 0;
            animation-delay: 0.5s;
        }

        /* عنوان شغلی */
        .job-title {
            font-size: clamp(1.2rem, 3vw, 1.8rem);
            margin: 15px 0;
            opacity: 0;
            animation: fadeIn 1.2s forwards 2.2s;
            text-shadow: 0 0 10px rgba(0, 0, 0, 0.7);
            font-weight: 400;
            line-height: 1.5;
            color: rgba(255, 255, 255, 0.9);
            max-width: 100%;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* بخش اطلاعات تماس */
        .contact-info {
            margin-top: 40px;
            opacity: 0;
            animation: slideUp 1s forwards 3s;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 15px;
        }

        /* آیتم‌های تماس */
        .contact-item {
            display: inline-flex;
            align-items: center;
            padding: 12px 25px;
            background-color: rgba(0, 0, 0, 0.4);
            border-radius: 30px;
            transition: all 0.3s ease;
            cursor: pointer;
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            min-width: 180px;
            justify-content: center;
        }

        .contact-item:hover {
            background-color: rgba(255, 255, 255, 0.15);
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
        }

        .contact-item a {
            color: white;
            text-decoration: none;
            font-size: 1rem;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* آیکون‌ها */
        .contact-icon {
            width: 18px;
            height: 18px;
            fill: currentColor;
        }

        /* انیمیشن‌ها */
        @keyframes typing {
            from { 
                width: 0;
                opacity: 1;
            }
            to { 
                width: 100%;
                opacity: 1;
            }
        }

        @keyframes blink-caret {
            from, to { border-color: transparent }
            50% { border-color: rgba(255, 255, 255, 0.75) }
        }

        @keyframes fadeIn {
            to { opacity: 1 }
        }

        @keyframes slideUp {
            from { 
                opacity: 0;
                transform: translateY(30px);
            }
            to { 
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* تنظیمات برای موبایل */
        @media (max-width: 768px) {
            .portfolio-container {
                width: 95%;
                padding: 15px;

            .name-title {

            .job-title {

            .contact-info {

        @media (max-width: 480px) {
