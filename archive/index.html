        <style>
    @font-face {
        font-family: 'iconfont';
        src: url('iconfont.ttf') format('truetype');
    }

    * {
        user-select: none;
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    html, body {
        overflow: hidden;
        background-color: #000;
        height: 100%;
        font-smooth: always;
        -webkit-font-smoothing: antialiased;
    }

    body {
        margin: 0;
        position: fixed;
        width: 100%;
        height: 100%;
        font-family: 'Montserrat', sans-serif;
        line-height: 1.6;
    }

    canvas {
        width: 100%;
        height: 100%;
        display: block;
    }

    /* Base Section Styles */
    .portfolio-section {
        position: absolute;
        left: 50%;
        transform: translateX(-50%);
        text-align: center;
        color: white;
        z-index: 10;
        width: 90%;
        max-width: 800px;
        opacity: 0;
    }

    /* Header Section */
    .header-section {
        top: 25%; /* کاهش فاصله از بالا */
        animation: fadeIn 1.2s forwards 0.5s;
    }

    /* Name Title */
    .name-title {
        font-size: clamp(2.5rem, 6vw, 4rem);
        margin: 0;
        overflow: hidden;
        white-space: nowrap;
        border-right: 3px solid rgba(255, 255, 255, 0.75);
        animation: 
            typing 1.8s steps(30, end) forwards,
            blink-caret 0.75s step-end infinite;
        text-shadow: 0 0 15px rgba(0, 0, 0, 0.8);
        font-family: 'Playfair Display', serif;
        font-weight: 700;
        letter-spacing: 1px;
        color: #fff;
        line-height: 1.2;
        margin-bottom: 10px; /* افزودن فاصله پایینی */
    }

    /* Job Title */
    .job-title {
        font-size: clamp(1.2rem, 3vw, 1.8rem);
        margin: 10px 0 20px 0; /* تنظیم بهتر فاصله‌ها */
        text-shadow: 0 0 10px rgba(0, 0, 0, 0.7);
        font-weight: 400;
        color: rgba(255, 255, 255, 0.9);
        max-width: 100%;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        animation: fadeIn 1.2s forwards 1.8s; /* تنظیم زمان انیمیشن */
    }

    /* Skills Section */
    .skills-section {
        top: 40%; /* موقعیت پایین‌تر */
        animation: fadeIn 1.5s forwards 2.5s; /* تنظیم زمان انیمیشن */
        margin-top: 20px;
    }

    .skills {
        display: flex;
        justify-content: center;
        gap: 15px;
        flex-wrap: wrap;
        margin-bottom: 25px;
    }

    .skill-item {
        font-size: clamp(0.8rem, 1.5vw, 1rem);
        color: rgba(255, 255, 255, 0.9);
        letter-spacing: 1px;
        position: relative;
        padding: 0 10px;
        font-weight: 500;
        line-height: 1.6;
    }

    .skill-item:not(:last-child):after {
        content: "•";
        position: absolute;
        right: -10px;
        color: rgba(255, 255, 255, 0.5);
    }

    /* Contact Section */
    .contact-section {
        top: 50%; /* موقعیت پایین‌تر */
        animation: slideUp 1s forwards 3s; /* تنظیم زمان انیمیشن */
        margin-top: 20px;
    }

    .contact-info {
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 15px;
        margin: 0 auto;
        max-width: 600px;
    }

    /* Contact Items */
    .contact-item {
        display: inline-flex;
        align-items: center;
        padding: 12px 25px;
        background-color: rgba(255, 255, 255, 0.1);
        border-radius: 30px;
        transition: all 0.3s ease;
        cursor: pointer;
        backdrop-filter: blur(10px);
        border: 1px solid rgba(255, 255, 255, 0.2);
        min-width: 180px;
        justify-content: center;
        margin: 5px 0;
    }

    .contact-item:hover {
        background-color: rgba(255, 255, 255, 0.2);
        transform: translateY(-3px);
        box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
    }

    .contact-item a {
        color: white;
        text-decoration: none;
        font-size: 1rem;
        font-weight: 500;
        display: flex;
        align-items: center;
        gap: 8px;
    }

    /* Icons */
    .contact-icon {
        width: 18px;
        height: 18px;
        fill: currentColor;
    }

    /* Resume Section */
    .resume-section {
        top: 70%; /* موقعیت پایین‌تر */
        animation: slideUp 1s forwards 3.5s;
        margin-top: 30px;
    }

    /* Animations */
    @keyframes typing {
        from { 
            width: 0;
            opacity: 1;
        }
        to { 
            width: 100%;
            opacity: 1;
        }
    }

    @keyframes blink-caret {
        from, to { border-color: transparent }
        50% { border-color: rgba(255, 255, 255, 0.75) }
    }

    @keyframes fadeIn {
        to { opacity: 1 }
    }

    @keyframes slideUp {
        from { 
            opacity: 0;
            transform: translate(-50%, 20px);
        }
        to { 
            opacity: 1;
            transform: translate(-50%, 0);
        }
    }

    /* Mobile Settings */
    @media (max-width: 768px) {
        .header-section {
            top: 10%;
        }
        
        .name-title {
            font-size: 2.2rem;
            border-right-width: 2px;
            white-space: normal;
            animation: none;
            border-right: none;
            opacity: 1;
        }
        
        .job-title {
            font-size: 1.1rem;
            margin: 10px 0 15px 0;
            white-space: normal;
            animation: fadeIn 1.2s forwards 0.8s;
        }
        
        .skills-section {
            top: 25%;
            animation: fadeIn 1.5s forwards 1.8s;
        }
        
        .contact-section {
            top: 45%;
            animation: slideUp 1s forwards 2.3s;
        }
        
        .resume-section {
            top: 65%;
            animation: slideUp 1s forwards 2.8s;
        }
        
        .contact-item {
            padding: 10px 15px;
            min-width: 160px;
        }
        
        .contact-item a {
            font-size: 0.9rem;
        }

        .skills {
            gap: 10px;
            margin-bottom: 20px;
        }

        .skill-item {
            font-size: 0.9rem;
        }
    }

    @media (max-width: 480px) {
        .header-section {
            top: 8%;
        }
        
        .name-title {
            font-size: 1.8rem;
        }
        
        .job-title {
            font-size: 1rem;
        }
        
        .skills-section {
            top: 22%;
        }
        
        .contact-section {
            top: 40%;
        }
        
        .resume-section {
            top: 60%;
        }
        
        .contact-info {
            flex-direction: row;
            flex-wrap: wrap;
            gap: 8px;
        }
        
        .contact-item {
            min-width: 120px;
            padding: 8px 12px;
            font-size: 0.8rem;
        }
        
        .skill-item {
            font-size: 0.8rem;
            padding: 0 8px;
        }

        .skill-item:not(:last-child):after {
            right: -8px;
        }
    }

    /* Credits */
    .credits {
        position: fixed;
        bottom: 10px;
        right: 10px;
        font-size: 12px;
        color: rgba(255,255,255,0.5);
        font-family: 'Montserrat', sans-serif;
        z-index: 100;
        background-color: rgba(0,0,0,0.2);
        padding: 5px 10px;
        border-radius: 3px;
        backdrop-filter: blur(2px);
    }

    .credits a {
        color: rgba(255,255,255,0.7);
        text-decoration: none;
        transition: color 0.3s;
    }

    .credits a:hover {
        color: white;
        text-decoration: underline;
    }
